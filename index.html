<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iqra</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
    }

    .hero {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 42px;
    }

    .subtitle {
      margin: 0;
      color: #cbd5e1;
      font-size: 18px;
    }

    .card {
      background: white;
      color: #111827;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .mic {
      background: #2563eb;
      color: white;
    }

    .section {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      margin-top: 14px;
    }

    .label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .verse-ref {
      font-size: 24px;
      font-weight: bold;
      margin: 0;
    }

    .arabic {
      font-size: 34px;
      line-height: 2;
      text-align: right;
      direction: rtl;
      margin: 0;
      font-weight: 600;
    }

    .transliteration {
      font-size: 18px;
      color: #334155;
      margin: 14px 0 0 0;
      font-style: italic;
    }

    .translation {
      font-size: 17px;
      color: #475569;
      margin: 10px 0 0 0;
    }

    .output {
      min-height: 28px;
      font-size: 18px;
      margin: 0;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 34px;
      }

      .verse-ref {
        font-size: 20px;
      }

      .arabic {
        font-size: 26px;
      }

      .transliteration,
      .translation,
      .output {
        font-size: 16px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Iqra</h1>
      <p class="subtitle">A Quran hifdh tester with random ayah and voice input.</p>
    </div>

    <div class="card">
      <div class="buttons">
        <button class="primary" onclick="randomVerse()">Random Ayah</button>
        <button class="secondary" onclick="toggleText()">Show / Hide Text</button>
        <button class="mic" onclick="startListening()">🎤 Start Listening</button>
      </div>

      <div class="section">
        <div class="label">Reference</div>
        <p id="verse" class="verse-ref">Click “Random Ayah” to begin</p>
      </div>

      <div class="section">
        <div class="label">Ayah</div>
        <div id="ayahBlock" style="display:none;">
          <p id="arabic" class="arabic"></p>
          <p id="translit" class="transliteration"></p>
          <p id="translation" class="translation"></p>
        </div>
      </div>

      <div class="section">
        <div class="label">Voice Output</div>
        <p id="output" class="output">Your recitation will appear here.</p>
      </div>
    </div>
  </div>

  <script>
    const verses = [
      {
        ref: "Al-Fatiha 1",
        arabic: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ",
        translit: "Bismillahir rahmanir rahim",
        translation: "In the name of Allah, the Most Compassionate, the Most Merciful."
      },
      {
        ref: "Al-Fatiha 2",
        arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
        translit: "Alhamdu lillahi rabbil alamin",
        translation: "All praise is for Allah, Lord of all worlds."
      },
      {
        ref: "Al-Ikhlas 1",
        arabic: "قُلْ هُوَ اللَّهُ أَحَدٌ",
        translit: "Qul huwa Allahu ahad",
        translation: "Say, He is Allah, the One."
      }
    ];

    let current;

    function randomVerse() {
      current = verses[Math.floor(Math.random() * verses.length)];
      document.getElementById("verse").innerText = current.ref;
      document.getElementById("arabic").innerText = current.arabic;
      document.getElementById("translit").innerText = current.translit;
      document.getElementById("translation").innerText = current.translation;
    }

    function toggleText() {
      const block = document.getElementById("ayahBlock");
      block.style.display = block.style.display === "none" ? "block" : "none";
    }

    function startListening() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        document.getElementById("output").innerText =
          "Speech recognition is not supported in this browser.";
        return;
      }

      const rec = new SpeechRecognition();
      rec.lang = "ar-SA";

      rec.onresult = function (e) {
        const spoken = e.results[0][0].transcript;
        document.getElementById("output").innerText = "You said: " + spoken;
      };

      rec.onerror = function () {
        document.getElementById("output").innerText =
          "Something went wrong with the microphone.";
      };

      rec.start();
    }
  </script>
</body>
</html>
